<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandDark: '#000000',
            brandPureDark: '#050505',
            brandWhite: '#ffffff',
            brandMuted: '#8a8a8a',
            brandAccent: '#e5e5e5',
            brandBorder: '#1c1c1e'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Instrument Serif"', 'serif'],
            mono: ['"Space Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <style>
    /* Premium smooth scrollbar and selections */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #000000;
    }
    ::-webkit-scrollbar-thumb {
      background: #2c2c2e;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a3c;
    }
    ::selection {
      background-color: #ffffff;
      color: #000000;
    }
    
    /* Fade-in Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in {
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    /* Fine-grained typography styling for Markdown articles */
    .prose-cinematic {
      color: #e5e5e5;
      font-family: 'Inter', sans-serif;
      line-height: 1.8;
      letter-spacing: -0.011em;
    }
    .prose-cinematic p {
      margin-bottom: 1.75em;
    }
    .prose-cinematic h1, 
    .prose-cinematic h2, 
    .prose-cinematic h3, 
    .prose-cinematic h4 {
      color: #ffffff;
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      line-height: 1.25;
      margin-top: 1.75em;
      margin-bottom: 0.5em;
    }
    .prose-cinematic h1 { font-size: 2.5rem; }
    .prose-cinematic h2 { font-size: 2rem; }
    .prose-cinematic h3 { font-size: 1.6rem; }
    
    .prose-cinematic blockquote {
      border-left: 2px solid #ffffff;
      padding-left: 1.5rem;
      font-style: italic;
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      line-height: 1.4;
      color: #ffffff;
      margin: 2rem 0;
    }
    .prose-cinematic a {
      color: #ffffff;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
      transition: color 0.2s ease;
    }
    .prose-cinematic a:hover {
      color: #8a8a8a;
    }
    .prose-cinematic code {
      font-family: 'Space Mono', monospace;
      background-color: #1c1c1e;
      padding: 0.2em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .prose-cinematic pre {
      background-color: #0c0c0e;
      border: 1px solid #1c1c1e;
      padding: 1.25rem;
      overflow-x: auto;
      border-radius: 4px;
      margin: 1.75rem 0;
    }
    .prose-cinematic pre code {
      background-color: transparent;
      padding: 0;
      border-radius: 0;
      font-size: 0.85em;
      color: #e5e5e5;
    }
    .prose-cinematic ul {
      list-style-type: square;
      padding-left: 1.5rem;
      margin-bottom: 1.75em;
    }
    .prose-cinematic ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
      margin-bottom: 1.75em;
    }
    .prose-cinematic li {
      margin-bottom: 0.5em;
    }
    .prose-cinematic hr {
      border-color: #1c1c1e;
      margin: 3rem 0;
    }
  </style>
</head>
<body class="bg-brandDark text-brandAccent antialiased selection:bg-brandWhite selection:text-brandDark flex flex-col min-h-screen">

  <!-- Header -->
  <header class="w-full max-w-5xl mx-auto px-6 pt-10 md:pt-16 pb-6 flex justify-between items-center z-10">
    <a href="{{ '/' | relative_url }}" class="group flex items-center gap-3">
      <img src="{{ '/assets/83592848.jpeg' | relative_url }}" alt="Vertigo Logo" class="w-8 h-8 rounded-full object-cover transition-transform duration-300 group-hover:scale-110">
      <span class="font-mono text-sm tracking-widest text-brandWhite uppercase group-hover:text-brandMuted transition-colors duration-300">Vertigo</span>
    </a>
    
    <nav class="flex items-center gap-6 font-mono text-xs tracking-widest uppercase">
      <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' or page.url == '/index.html' %}text-brandWhite{% else %}text-brandMuted{% endif %} hover:text-brandWhite transition-colors duration-300">Journal</a>
      <a href="{{ '/portfolio/' | relative_url }}" class="{% if page.url == '/portfolio/' %}text-brandWhite{% else %}text-brandMuted{% endif %} hover:text-brandWhite transition-colors duration-300">Portfolio</a>
      <a href="{{ '/about/' | relative_url }}" class="{% if page.url == '/about/' %}text-brandWhite{% else %}text-brandMuted{% endif %} hover:text-brandWhite transition-colors duration-300">About & Contact</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="flex-grow w-full max-w-5xl mx-auto px-6 pt-2 pb-8 md:pt-4 md:pb-16 animate-fade-in">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="w-full max-w-5xl mx-auto px-6 py-10 md:py-16 border-t border-brandBorder flex flex-col md:flex-row md:justify-between items-start md:items-center gap-6 text-brandMuted font-mono text-xs">
    <div>
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All stories captured.</p>
    </div>
    <div class="flex gap-6">
      <a href="{{ site.instagram_url }}" target="_blank" rel="noopener noreferrer" class="hover:text-brandWhite transition-colors duration-300">Instagram</a>
      <a href="{{ site.letterboxd_url }}" target="_blank" rel="noopener noreferrer" class="hover:text-brandWhite transition-colors duration-300">Letterboxd</a>
      <a href="https://www.youtube.com/@VyomVertigo" target="_blank" rel="noopener noreferrer" class="hover:text-brandWhite transition-colors duration-300">YouTube</a>
      <a href="mailto:{{ site.email }}" class="hover:text-brandWhite transition-colors duration-300">Contact</a>
    </div>
  </footer>

</body>
</html>
